name: ci-dgraph-load-tests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
      - release/**

permissions:
  contents: read

jobs:
  check-changes:
    uses: ./.github/workflows/check-changes.yml

  dgraph-load-tests:
    needs: check-changes
    if:
      github.event.pull_request.draft == false && needs.check-changes.outputs.should-skip != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Restore load test dataset cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/test-data
          key: dataset-load-${{ hashFiles('testutil/benchmark-data-version') }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Make Linux Build and Docker Image
        run: make docker-image # this internally builds dgraph binary

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build Test Binary
        run: |
          #!/bin/bash
          # build the test binary
          cd t; go build .

      - name: Clean Up Environment
        run: |
          #!/bin/bash
          # clean cache
          go clean -testcache
          # clean up docker containers before test execution
          cd t; ./t -r

      - name: Run Load Tests
        run: |
          #!/bin/bash
          # go env settings
          export GOPATH=~/go
          # move the binary
          cp dgraph/dgraph ~/go/bin/dgraph
          # run the load tests
          cd t; ./t --suite=load --tmp=${{ github.workspace }}/test-data --keep-data
          # clean up docker containers after test execution
          ./t -r
          # sleep
          sleep 5

      - name: Save load test dataset cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/test-data
          key: dataset-load-${{ hashFiles('testutil/benchmark-data-version') }}
