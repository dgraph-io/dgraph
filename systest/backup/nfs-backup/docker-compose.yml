version: "3.5"
services:
  #HA backup cluster
  alpha1_backup_clust_ha:
    depends_on:
      - nfs
    image: dgraph-nfs-client:local
    build:
      context: .
      dockerfile: ./Dockerfile
    working_dir: /data/alpha1
    links:
      - nfs:nfs
    privileged: true
    labels:
      cluster: test
    ports:
      - "8080"
      - "9080"
    volumes:
      - type: bind
        source: $GOPATH/bin
        target: /gobin
        read_only: true
    command:
      - /bin/sh
      - -c
      - |
        # Load NFS kernel modules (harmless to leave in, though Ganesha doesn't need them)
        modprobe nfs 2>/dev/null || true
        modprobe nfsv3 2>/dev/null || true

        # Create mount point
        mkdir -p /mnt

        # Wait for NFS server to be ready
        echo "Waiting for NFS server to be ready..."
        for i in $(seq 1 15); do
          if ping -c 1 -W 1 nfs >/dev/null 2>&1; then
            echo "NFS server is reachable"
            sleep 2
            break
          fi
          if [ $i -eq 15 ]; then
            echo "WARNING: NFS server not reachable, attempting mount anyway"
          fi
          sleep 1
        done

        # CRITICAL FIXES:
        # 1. 'nolock': Disables NLM sidecar protocol (fixes rpc.statd error)
        # 2. 'nfs:/data': Ganesha exports the full path, not root fsid=0
        mount -v -o vers=3,nolock,soft,timeo=10,retrans=3 nfs:/data /mnt

        if ! mountpoint -q /mnt; then
          echo "ERROR: Mount failed"
          exit 1
        fi
        echo "NFS mount successful"
        /gobin/dgraph  ${COVERAGE_OUTPUT} alpha --my=alpha1_backup_clust_ha:7080  --zero=zero1_backup_clust_ha:5080,zero2_backup_clust_ha:5080,zero3_backup_clust_ha:5080 --logtostderr -v=2  --security "whitelist=0.0.0.0/0;"

  alpha2_backup_clust_ha:
    image: dgraph-nfs-client:local
    working_dir: /data/alpha2
    depends_on:
      - alpha1_backup_clust_ha
    links:
      - nfs:nfs
    labels:
      cluster: test
    ports:
      - "8080"
      - "9080"
    volumes:
      - type: bind
        source: $GOPATH/bin
        target: /gobin
