    command:
      /gobin/dgraph  ${COVERAGE_OUTPUT} alpha
      --my=alpha2_backup_clust_ha:7080  --zero=zero1_backup_clust_ha:5080,zero2_backup_clust_ha:5080,zero3_backup_clust_ha:5080
      --logtostderr -v=2  --security "whitelist=0.0.0.0/0;"

